name: Daily Lighthouse Test BENU

on:
  schedule:
    - cron: '0 06 * * *'
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Home
            url: https://www.benu.ch/
          - name: Editorial
            url: https://www.benu.ch/e/flohsamen-das-kleine-wundermittel-mit-grosser-wirkung
          - name: Pharmacy
            url: https://www.benu.ch/p/benu-luzern-bahnhof
          - name: PDP
            url: https://www.benu.ch/kijimea-reizdarm-pro-kapsel-84-stuck
          - name: Category
            url: https://www.benu.ch/c/gesundheit/
          - name: Brandpage (LRP)
            url: https://www.benu.ch/b/la-roche-posay

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse
        run: |
          lighthouse "${{ matrix.url }}" \
            --output json \
            --output-path ./report.json \
            --chrome-path=$(which chromium-browser) \
            --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage --disable-gpu" \
            --quiet

      - name: Prüfe ob Report existiert
        run: ls -la *.json
      
      - name: Score als Artifact speichern
        env:
          PAGE_NAME: ${{ matrix.name }}
        run: |
          python3 <<'PYEOF' > "score-${PAGE_NAME}.json"
          import json, os
          from datetime import datetime, timezone

          with open('report.json') as f:
              d = json.load(f)

          def score(key):
              v = d.get('categories', {}).get(key, {}).get('score')
              return int(v * 100) if v is not None else 0

          out = {
              "date": datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M'),
              "page": os.environ['PAGE_NAME'],
              "performance": score('performance'),
              "accessibility": score('accessibility'),
              "seo": score('seo'),
              "best_practices": score('best-practices'),
          }
          print(json.dumps(out))
          PYEOF
          cat "score-${PAGE_NAME}.json"

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: score-${{ matrix.name }}
          path: score-${{ matrix.name }}.json

  update-results:
    runs-on: ubuntu-latest
    needs: lighthouse
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Alle Score-Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          pattern: score-*
          path: ./scores

      - name: results.json aktualisieren
        run: |
          python3 - <<EOF
          import json, glob
          with open("docs/results.json") as f:
              data = json.load(f)
          for file in glob.glob("scores/score-*/*.json"):
              print(f"Lese: {file}")
              with open(file) as f:
                  data.append(json.load(f))
          with open("docs/results.json", "w") as f:
              json.dump(data, f, indent=2)
          print(f"Gesamt Einträge: {len(data)}")
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/results.json
          git commit -m "Lighthouse scores $(date +'%Y-%m-%d')" || echo "Keine Änderungen"
          git push
